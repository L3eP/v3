<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Jaringan - MAYUNG NTB</title>
    <link rel="stylesheet" href="css/style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; overflow: hidden; }
        #map { height: calc(100vh - 0px); width: 100%; z-index: 1; }
        .map-legend { position: absolute; top: 20px; right: 20px; z-index: 1000; background: white; padding: 14px 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.85rem; line-height: 2; min-width: 120px; }
        .map-legend .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
        .map-legend .count { float: right; margin-left: 12px; font-weight: 600; color: #374151; }
        .map-legend .title { font-weight: 600; font-size: 0.8rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div id="map"></div>

    <div class="map-legend" id="mapLegend">
        <div class="title">Jaringan FTTH</div>
        <div><span class="dot" style="background:#7c3aed;"></span> OLT <span class="count" id="statOlt">0</span></div>
        <div><span class="dot" style="background:#2563eb;"></span> ODC <span class="count" id="statOdc">0</span></div>
        <div><span class="dot" style="background:#10b981;"></span> ODP <span class="count" id="statOdp">0</span></div>
        <div><span class="dot" style="background:#f59e0b;"></span> ONU <span class="count" id="statOnu">0</span></div>
    </div>

    <script src="js/csrf.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
