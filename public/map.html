<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Jaringan - MAYUNG</title>
    <link rel="stylesheet" href="css/style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; overflow: hidden; }
        #map { height: calc(100vh - 0px); width: 100%; z-index: 1; }
        .map-stats { position: absolute; bottom: 30px; left: 20px; z-index: 1000; background: white; padding: 12px 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.85rem; }
        .map-stats span { display: inline-flex; align-items: center; gap: 6px; margin-right: 15px; }
        .map-legend { position: absolute; top: 20px; right: 20px; z-index: 1000; background: white; padding: 12px 16px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 0.85rem; line-height: 2; }
        .map-legend i { width: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div id="map"></div>

    <div class="map-stats" id="mapStats">
        <span><i class="fas fa-broadcast-tower" style="color:#2563eb;"></i> ODC: <strong id="statOdc">0</strong></span>
        <span><i class="fas fa-plug" style="color:#10b981;"></i> ODP: <strong id="statOdp">0</strong></span>
    </div>

    <div class="map-legend">
        <div><i class="fas fa-broadcast-tower" style="color:#2563eb;"></i> ODC</div>
        <div><i class="fas fa-plug" style="color:#10b981;"></i> ODP</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
