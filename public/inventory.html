<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - MAYUNG</title>
  <link rel="stylesheet" href="css/style.css?v=9">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
  <style>
    .inv-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }
    .inv-card { background:var(--surface-color); padding:24px; border-radius:var(--radius-lg); border:1px solid var(--border-color); }
    .inv-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border-color); gap:12px; }
    .inv-info { flex:1; }
    .inv-name { font-weight:600; font-size:.95rem; }
    .inv-meta { font-size:.8rem; color:var(--text-muted); }
    .inv-stock { font-weight:700; font-size:1.1rem; }
    .inv-low { color:#ef4444; }
    .inv-ok { color:#10b981; }
    @media (max-width:768px) { .inv-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body class="with-sidebar">
  <div id="navbar"></div>
  <div class="dashboard-container">
    <div style="margin-bottom:24px;">
      <h1 style="margin:0;font-size:1.5rem;"><i class="fas fa-boxes" style="color:#0891b2;"></i> Inventory</h1>
      <p style="color:var(--text-muted);margin:5px 0 0 0;">Manajemen stok perangkat</p>
    </div>

    <div class="inv-grid">
      <div class="inv-card">
        <h3 style="margin:0 0 16px 0;font-size:1.05rem;"><i class="fas fa-plus-circle" style="color:#10b981;"></i> Tambah Item</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;gap:8px;">
            <select id="invDeviceType" class="filter-select" style="flex:1;">
              <option value="ODP">ODP</option>
              <option value="ONU">ONU</option>
              <option value="Kabel">Kabel (m)</option>
              <option value="Splice">Splice</option>
              <option value="Connector">Connector</option>
              <option value="Lainnya">Lainnya</option>
            </select>
            <input type="text" id="invDeviceName" placeholder="Nama/model perangkat" class="filter-select" style="flex:2;">
          </div>
          <div style="display:flex;gap:8px;">
            <input type="number" id="invTotalStock" placeholder="Jumlah stok" class="filter-select" style="flex:1;" min="0">
            <input type="text" id="invLocation" placeholder="Lokasi penyimpanan" class="filter-select" style="flex:2;">
          </div>
          <textarea id="invNotes" rows="2" placeholder="Catatan (opsional)" class="filter-select" style="resize:vertical;"></textarea>
          <button id="invSubmitBtn" class="login-btn" style="width:auto;padding:10px 24px;">
            <i class="fas fa-save"></i> Tambah ke Inventory
          </button>
        </div>
      </div>

      <div class="inv-card">
        <h3 style="margin:0 0 16px 0;font-size:1.05rem;">
          <i class="fas fa-list" style="color:#2563eb;"></i> Daftar Stok
          <span id="invCount" style="font-weight:400;color:var(--text-muted);font-size:.9rem;"></span>
        </h3>
        <div id="invListContainer" style="max-height:600px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="modal">
    <div class="modal-content" style="max-width:400px;">
      <h3 style="color:#ef4444;">Hapus Item</h3>
      <p id="confirmMessage" style="margin:15px 0;">Yakin ingin menghapus?</p>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="login-btn" style="background:#6b7280;" id="cancelDelBtn">Batal</button>
        <button class="login-btn" style="background:#ef4444;" id="confirmDelBtn">Hapus</button>
      </div>
    </div>
  </div>

  <script src="js/csrf.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/inventory.js"></script>
</body>
</html>
