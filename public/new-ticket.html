<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Ticket - MAYUNG</title>
    <link rel="stylesheet" href="css/style.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css">
</head>

<body class="with-sidebar">
    <div id="navbar"></div>

    <div class="dashboard-container">
        <div class="login-card max-w-600">
            <h2>Create New Ticket</h2>
            <form id="newTicketForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="aktifitas">Aktifitas</label>
                        <input type="text" id="aktifitas" name="aktifitas" required placeholder="e.g. PSB, Maintenance, Instalasi Baru">
                    </div>

                    <div class="form-group">
                        <label for="subNode">Sub-node</label>
                        <select id="subNode" name="subNode" required>
                            <option value="">Pilih Sub-Node</option>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="odc">ODC</label>
                        <select id="odc" name="odc" required>
                            <option value="">Pilih ODC</option>
                            <!-- Populated dynamically by JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="lokasi">Lokasi</label>
                        <input type="text" id="lokasi" name="lokasi" required placeholder="e.g. Server Room A">
                    </div>

                    <div class="form-group">
                        <label for="odp">ODP</label>
                        <select id="odp" name="odp">
                            <option value="">Pilih ODP (opsional)</option>
                            <!-- Populated dynamically based on ODC -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="pic">PIC</label>
                        <select id="pic" name="pic" required>
                            <option value="">Select PIC</option>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority" required>
                            <!-- Populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="Terlapor">Terlapor</option>
                            <option value="Dikerjakan">Dikerjakan</option>
                            <option value="Selesai">Selesai</option>
                            <option value="Pending">Pending</option>
                        </select>
                    </div>

                    <div class="form-group col-full">
                        <label for="info">Info</label>
                        <textarea id="info" name="info" rows="4" required
                            placeholder="Detailed description..."></textarea>
                    </div>

                    <div class="form-group col-full">
                        <label for="evidence">Evidence</label>
                        <input type="file" id="evidence" name="evidence" accept="image/*">
                    </div>

                    <div class="col-full">
                        <button type="submit" class="login-btn">Create Ticket</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Success/Error Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Error</h3>
            <p id="modalMessage">Something went wrong.</p>
            <button id="modalOkBtn" class="modal-ok-btn">OK</button>
        </div>
    </div>

    <script src="js/csrf.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/new-ticket.js"></script>
    <script src="js/toast.js"></script>
</body>

</html>
